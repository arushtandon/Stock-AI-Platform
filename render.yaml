# Stock AI Platform - Render Blueprint
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# Uses Starter for DB and Redis so you can have multiple (Render allows only 1 free DB + 1 free Redis per account).
# Cost: ~$7 Postgres + ~$10 Redis + ~$7 worker + free API/frontend/cron ≈ $25/mo (still far below Vultr $150).

databases:
  - name: stock-ai-db
    databaseName: stock_ai
    plan: basic-1gb  # Render paid Postgres plan name (~$7/mo). "starter" is invalid here.

services:
  - type: keyvalue
    name: stock-ai-redis
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
    plan: starter  # Key Value: starter is valid; free = 1 per account
    maxmemoryPolicy: noeviction

  - type: web
    name: stock-ai-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: stock-ai-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: stock-ai-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: stock-ai-redis
          property: port
      - key: CORS_ORIGINS
        value: https://stock-ai-frontend.onrender.com
      - key: DANELFIN_API_KEY
        sync: false
      - key: SEEKING_ALPHA_API_KEY
        sync: false
      - key: INVESTING_PRO_API_KEY
        sync: false
      - key: TRADINGVIEW_API_KEY
        sync: false

  - type: worker
    name: stock-ai-worker
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workers.celery_app worker -l info -Q default,daily --concurrency=1
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: stock-ai-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: stock-ai-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: stock-ai-redis
          property: port

  - type: cron
    name: stock-ai-daily
    runtime: python
    schedule: "0 14 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/render_daily.py
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: stock-ai-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: stock-ai-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: stock-ai-redis
          property: port

  - type: web
    name: stock-ai-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20"
